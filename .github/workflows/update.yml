name: Weekly Book Radar Updater

on:
  schedule:
    # 每週日凌晨 00:00 (UTC) 自動執行
    - cron: '0 0 * * 0'
  workflow_dispatch: # 支援手動點擊觸發

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 執行真實數據抓取與網頁生成
      run: python update_books.py

    - name: 自動將更新後的網頁推回倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html en.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 系統自動化：刷新每週跨平台電子書排行數據" && git push)